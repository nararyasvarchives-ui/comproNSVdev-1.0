<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News & Insights - PT Nararya Semesta Visitama</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#A11E21', 'primary-dark': '#831618', secondary: '#7F7F7F' },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          boxShadow: { soft: '0 4px 20px -2px rgba(0,0,0,0.05)' }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    .news-card { transition: all .3s ease; }
    .news-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(161,30,33,.1); }
    .skeleton { background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body class="bg-white text-gray-800">
<script src="navbar-loader.js"></script>

<!-- Hero -->
<section class="bg-gradient-to-br from-[#1a0305] via-[#A11E21] to-[#7d0f14] py-20 relative overflow-hidden">
  <div class="absolute inset-0 opacity-10" style="background-image:radial-gradient(circle at 2px 2px,white 1px,transparent 0);background-size:32px 32px;"></div>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
    <p class="text-white/60 text-sm font-semibold uppercase tracking-widest mb-3">Stay Informed</p>
    <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">News & Insights</h1>
    <p class="text-white/80 text-lg max-w-2xl mx-auto">Latest updates, articles, and insights from PT Nararya Semesta Visitama.</p>
  </div>
</section>

<!-- Breadcrumb -->
<div class="bg-gray-50 border-b border-gray-100">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
    <nav class="flex items-center gap-2 text-sm text-gray-500">
      <a href="index.html" class="hover:text-primary transition-colors">Home</a>
      <i class="ph ph-caret-right text-xs"></i>
      <span class="text-gray-900 font-medium">News & Insights</span>
    </nav>
  </div>
</div>

<!-- Grid -->
<section class="py-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div class="rounded-2xl overflow-hidden border border-gray-100"><div class="skeleton h-48 w-full"></div><div class="p-6"><div class="skeleton h-4 w-2/3 mb-3 rounded"></div><div class="skeleton h-3 w-full mb-2 rounded"></div><div class="skeleton h-3 w-4/5 rounded"></div></div></div>
      <div class="rounded-2xl overflow-hidden border border-gray-100"><div class="skeleton h-48 w-full"></div><div class="p-6"><div class="skeleton h-4 w-2/3 mb-3 rounded"></div><div class="skeleton h-3 w-full mb-2 rounded"></div><div class="skeleton h-3 w-4/5 rounded"></div></div></div>
      <div class="rounded-2xl overflow-hidden border border-gray-100"><div class="skeleton h-48 w-full"></div><div class="p-6"><div class="skeleton h-4 w-2/3 mb-3 rounded"></div><div class="skeleton h-3 w-full mb-2 rounded"></div><div class="skeleton h-3 w-4/5 rounded"></div></div></div>
    </div>
    <div id="news-empty" class="hidden text-center py-20">
      <i class="ph ph-newspaper text-6xl text-gray-300 mb-4"></i>
      <p class="text-gray-400 text-lg">No news published yet. Check back soon.</p>
    </div>
    <div id="news-error" class="hidden text-center py-20">
      <i class="ph ph-warning text-5xl text-red-300 mb-4"></i>
      <p class="text-gray-400">Could not load news. Please try again later.</p>
    </div>
  </div>
</section>

<script>
const API    = window.location.origin + '/api/method/nsv_compro.api.endpoints.get_news';
const FRAPPE = window.location.origin;

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}

async function loadNews() {
  try {
    const res  = await fetch(API);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const items = data.message || [];
    const grid  = document.getElementById('news-grid');
    grid.innerHTML = '';
    if (!items.length) {
      document.getElementById('news-empty').classList.remove('hidden');
      return;
    }
    items.forEach(item => {
      const img = item.image
        ? `<img src="${FRAPPE}${item.image}" alt="${item.title}" class="w-full h-48 object-cover">`
        : `<div class="w-full h-48 bg-gradient-to-br from-gray-50 to-red-50 flex items-center justify-center"><i class="ph ph-newspaper text-5xl text-primary/20"></i></div>`;
      grid.innerHTML += `
        <a href="news-detail.html?id=${item.name}" class="news-card bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-soft flex flex-col group">
          <div class="overflow-hidden">${img}</div>
          <div class="p-6 flex flex-col flex-grow">
            ${item.category ? `<span class="inline-block text-xs font-semibold text-primary bg-red-50 px-3 py-1 rounded-full mb-3 w-fit">${item.category}</span>` : ''}
            <h3 class="text-lg font-bold text-gray-900 mb-2 group-hover:text-primary transition-colors line-clamp-2">${item.title}</h3>
            ${item.excerpt ? `<p class="text-sm text-secondary leading-relaxed flex-grow line-clamp-3">${item.excerpt}</p>` : ''}
            <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
              <div class="flex items-center gap-2">
                ${item.author ? `<span class="text-xs text-gray-400"><i class="ph ph-user mr-1"></i>${item.author}</span>` : ''}
                <span class="text-xs text-gray-400">${formatDate(item.published_at)}</span>
              </div>
              <span class="text-xs font-semibold text-primary flex items-center gap-1">Read <i class="ph ph-arrow-right"></i></span>
            </div>
          </div>
        </a>`;
    });
  } catch {
    document.getElementById('news-grid').innerHTML = '';
    document.getElementById('news-error').classList.remove('hidden');
  }
}

loadNews();
</script>

<script src="footer-loader.js"></script>
</body>
</html>
