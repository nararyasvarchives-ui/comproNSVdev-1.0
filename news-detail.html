<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <link rel="icon" type="image/x-icon" href="assets/image/favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Detail - PT Nararya Semesta Visitama</title>
  <script src="assets/js/tailwind.cdn.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#A11E21', 'primary-dark': '#831618', secondary: '#7F7F7F' },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          boxShadow: { soft: '0 4px 20px -2px rgba(0,0,0,0.05)' }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    .prose-content p { margin-bottom: 1rem; line-height: 1.8; color: #4b5563; }
    .prose-content h2, .prose-content h3 { font-weight: 700; color: #111827; margin: 1.5rem 0 .75rem; }
    .prose-content ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #4b5563; }
    .prose-content li { margin-bottom: .4rem; }
    .prose-content a { color: #A11E21; text-decoration: underline; }
    .prose-content blockquote { border-left: 4px solid #A11E21; padding-left: 1rem; color: #6b7280; font-style: italic; margin: 1.5rem 0; }
    .skeleton { background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body class="bg-white text-gray-800">
<script src="navbar-loader.js"></script>

<!-- Breadcrumb -->
<div class="bg-gray-50 border-b border-gray-100 mt-16">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
    <nav class="flex items-center gap-2 text-sm text-gray-500">
      <a href="index.html" class="hover:text-primary transition-colors">Home</a>
      <i class="ph ph-caret-right text-xs"></i>
      <a href="news.html" class="hover:text-primary transition-colors">News & Insights</a>
      <i class="ph ph-caret-right text-xs"></i>
      <span id="breadcrumb-title" class="text-gray-900 font-medium truncate max-w-xs">Loading...</span>
    </nav>
  </div>
</div>

<!-- Content -->
<main class="py-16">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Loading -->
    <div id="loading-state">
      <div class="skeleton h-8 w-3/4 mb-4 rounded"></div>
      <div class="skeleton h-4 w-1/3 mb-8 rounded"></div>
      <div class="skeleton h-72 w-full mb-8 rounded-2xl"></div>
      <div class="skeleton h-4 w-full mb-3 rounded"></div>
      <div class="skeleton h-4 w-5/6 mb-3 rounded"></div>
      <div class="skeleton h-4 w-4/5 rounded"></div>
    </div>

    <!-- Error -->
    <div id="error-state" class="hidden text-center py-20">
      <i class="ph ph-warning text-5xl text-red-300 mb-4"></i>
      <p class="text-gray-400">Article not found.</p>
      <a href="news.html" class="inline-flex items-center gap-2 mt-4 text-primary font-semibold hover:underline"><i class="ph ph-arrow-left"></i> Back to News</a>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
      <div class="grid lg:grid-cols-3 gap-12">

        <!-- Article -->
        <article class="lg:col-span-2">
          <!-- Meta -->
          <div class="flex flex-wrap items-center gap-3 mb-4">
            <span id="detail-category" class="hidden text-xs font-semibold text-primary bg-red-50 px-3 py-1 rounded-full"></span>
            <span id="detail-date" class="text-xs text-gray-400 flex items-center gap-1"><i class="ph ph-calendar"></i></span>
            <span id="detail-author" class="hidden text-xs text-gray-400 flex items-center gap-1"><i class="ph ph-user"></i></span>
          </div>

          <h1 id="detail-title" class="text-3xl md:text-4xl font-bold text-gray-900 mb-6 leading-tight"></h1>

          <!-- Gallery Viewer: Big Frame + Thumbnail Strip -->
          <div id="gallery-viewer" class="hidden mb-8">
            <div id="big-frame" class="rounded-2xl overflow-hidden bg-gray-100 mb-2"></div>
            <div id="thumb-strip" class="hidden gap-2 overflow-x-auto pb-1 mt-2"></div>
          </div>

          <!-- Excerpt as lead -->
          <p id="detail-excerpt" class="hidden text-lg text-gray-500 leading-relaxed mb-8 pb-8 border-b border-gray-100 font-light"></p>

          <!-- Body -->
          <div id="detail-body" class="prose-content"></div>

          <!-- YouTube Video -->
          <div id="video-section" class="hidden mt-10">
            <h3 class="font-bold text-gray-900 text-xl mb-4 flex items-center gap-2"><i class="ph ph-youtube-logo text-[#A11E21]"></i> Video</h3>
            <div class="aspect-video rounded-2xl overflow-hidden bg-gray-100">
              <iframe id="youtube-embed" src="" class="w-full h-full" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
          </div>

          <!-- Lightbox -->
          <div id="lightbox" class="fixed inset-0 bg-black/90 z-[999] hidden items-center justify-center p-4" onclick="if(event.target===this)closeLightbox()">
            <div id="lightbox-inner" class="max-w-4xl w-full max-h-full overflow-hidden rounded-xl relative"></div>
            <button onclick="closeLightbox()" class="absolute top-4 right-4 text-white bg-black/40 hover:bg-black/80 w-10 h-10 rounded-full flex items-center justify-center text-xl transition-all"><i class="ph ph-x"></i></button>
          </div>

          <!-- Share / Back -->
          <div class="mt-12 pt-8 border-t border-gray-100 flex items-center justify-between flex-wrap gap-4">
            <a href="news.html" class="inline-flex items-center gap-2 text-primary font-semibold hover:underline text-sm">
              <i class="ph ph-arrow-left"></i> Back to News
            </a>
            <div class="flex items-center gap-3">
              <span class="text-sm text-gray-400">Share:</span>
              <a id="share-wa" href="#" target="_blank" class="w-9 h-9 rounded-full border border-gray-200 flex items-center justify-center hover:bg-green-50 hover:border-green-400 transition-all text-gray-500 hover:text-green-600">
                <i class="ph ph-whatsapp-logo text-lg"></i>
              </a>
              <a id="share-li" href="#" target="_blank" class="w-9 h-9 rounded-full border border-gray-200 flex items-center justify-center hover:bg-blue-50 hover:border-blue-400 transition-all text-gray-500 hover:text-blue-600">
                <i class="ph ph-linkedin-logo text-lg"></i>
              </a>
            </div>
          </div>
        </article>

        <!-- Sidebar -->
        <aside>
          <div class="space-y-6 sticky top-28">

            <!-- Article Info -->
            <div class="bg-gray-50 rounded-2xl p-6 border border-gray-100 space-y-4">
              <h3 class="font-bold text-gray-900 text-sm uppercase tracking-wider">Article Info</h3>
              <div id="sb-date-wrap" class="hidden">
                <p class="text-xs text-gray-400 mb-1">Published</p>
                <p id="sb-date" class="text-sm font-semibold text-gray-800"></p>
              </div>
              <div id="sb-author-wrap" class="hidden">
                <p class="text-xs text-gray-400 mb-1">Author</p>
                <p id="sb-author" class="text-sm font-semibold text-gray-800"></p>
              </div>
              <div id="sb-category-wrap" class="hidden">
                <p class="text-xs text-gray-400 mb-1">Category</p>
                <p id="sb-category" class="text-sm font-semibold text-gray-800"></p>
              </div>
            </div>

            <!-- CTA -->
            <div class="bg-gradient-to-br from-[#A11E21] to-[#7d0f14] rounded-2xl p-6 text-white">
              <h3 class="font-bold mb-2">Need our services?</h3>
              <p class="text-white/80 text-sm mb-4">Let's discuss how NSV can help your business grow.</p>
              <a href="index.html#Contact-Us"
                 class="block w-full text-center bg-white text-primary font-semibold py-2.5 rounded-xl text-sm hover:bg-gray-100 transition-all">
                Contact Us
              </a>
            </div>

          </div>
        </aside>

      </div>
    </div>
  </div>
</main>

<script src="inquiry.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const id     = params.get('id');
const FRAPPE = window.location.origin;
const API    = FRAPPE + '/api/method/nsv_compro.api.endpoints.get_news_detail';

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}

function getYouTubeEmbed(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?\s]+)/);
  return m ? `https://www.youtube.com/embed/${m[1]}?rel=0` : null;
}

const FRAPPE_O = window.location.origin;
function isVid(s){ return s && s.toLowerCase().endsWith('.mp4'); }

function renderBigFrame(src, cap) {
  const f = document.getElementById('big-frame');
  if (isVid(src)) {
    f.innerHTML = `<video src="${FRAPPE_O}${src}" autoplay loop muted playsinline class="w-full max-h-96 object-cover"></video>`;
    f.style.cursor='default'; f.onclick=null;
  } else {
    f.innerHTML = `<img src="${FRAPPE_O}${src}" alt="${cap||''}" class="w-full object-cover max-h-96">`;
    f.style.cursor='zoom-in'; f.onclick=()=>openLightbox(src,false,cap);
  }
}

function setActiveThumb(idx) {
  const list=window._gList||[]; if(!list[idx])return;
  window._gIdx=idx; renderBigFrame(list[idx].image,list[idx].caption||'');
  document.querySelectorAll('.nsv-thumb').forEach((b,i)=>{
    b.classList.toggle('ring-2',i===idx);
    b.classList.toggle('ring-[#A11E21]',i===idx);
    b.classList.toggle('opacity-50',i!==idx);
  });
}

function buildGallery(images){
  if(!images||!images.length)return;
  window._gList=images; window._gIdx=0;
  renderBigFrame(images[0].image,images[0].caption||'');
  document.getElementById('gallery-viewer').classList.remove('hidden');
  if(images.length>1){
    const strip=document.getElementById('thumb-strip');
    strip.innerHTML=images.map((img,i)=>{
      const t=isVid(img.image)
        ?`<video src="${FRAPPE_O}${img.image}" muted class="w-full h-full object-cover pointer-events-none"></video>`
        :`<img src="${FRAPPE_O}${img.image}" alt="${img.caption||''}" class="w-full h-full object-cover">`;
      const a=i===0?'ring-2 ring-[#A11E21]':'opacity-50 hover:opacity-100';
      return `<button onclick="setActiveThumb(${i})" class="nsv-thumb flex-shrink-0 w-20 h-16 rounded-lg overflow-hidden border border-gray-200 transition-all ${a}">${t}</button>`;
    }).join('');
    strip.classList.remove('hidden'); strip.classList.add('flex');
  }
}

function openLightbox(src,vid,cap){
  const lb=document.getElementById('lightbox'),inner=document.getElementById('lightbox-inner');
  inner.innerHTML=vid
    ?`<video src="${FRAPPE_O}${src}" controls autoplay loop class="w-full max-h-[85vh] rounded-xl"></video>`
    :`<img src="${FRAPPE_O}${src}" alt="${cap||''}" class="w-full max-h-[85vh] object-contain rounded-xl">`;
  if(cap)inner.innerHTML+=`<p class="text-white/70 text-sm text-center mt-2">${cap}</p>`;
  lb.classList.remove('hidden'); lb.classList.add('flex');
}

function closeLightbox(){
  document.getElementById('lightbox').classList.add('hidden');
  document.getElementById('lightbox').classList.remove('flex');
  document.getElementById('lightbox-inner').innerHTML='';
}

async function load() {
  if (!id) { showError(); return; }
  try {
    const res  = await fetch(`${API}?name=${encodeURIComponent(id)}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const item = data.message;
    if (!item) throw new Error();

    document.title = item.title + ' - NSV News';
    document.getElementById('breadcrumb-title').textContent = item.title;
    document.getElementById('detail-title').textContent    = item.title;

    if (item.category) {
      const el = document.getElementById('detail-category');
      el.textContent = item.category; el.classList.remove('hidden');
      document.getElementById('sb-category').textContent = item.category;
      document.getElementById('sb-category-wrap').classList.remove('hidden');
    }
    if (item.published_at) {
      document.getElementById('detail-date').innerHTML = `<i class="ph ph-calendar"></i> ${formatDate(item.published_at)}`;
      document.getElementById('sb-date').textContent = formatDate(item.published_at);
      document.getElementById('sb-date-wrap').classList.remove('hidden');
    }
    if (item.author) {
      const el = document.getElementById('detail-author');
      el.innerHTML = `<i class="ph ph-user"></i> ${item.author}`; el.classList.remove('hidden');
      document.getElementById('sb-author').textContent = item.author;
      document.getElementById('sb-author-wrap').classList.remove('hidden');
    }
    // Build gallery viewer
    const images=(item.images&&item.images.length)
      ?item.images
      :(item.image?[{image:item.image,caption:item.title}]:[]);
    buildGallery(images);

    if (item.excerpt) {
      const el = document.getElementById('detail-excerpt');
      el.textContent = item.excerpt; el.classList.remove('hidden');
    }

    const body = item.content || item.description || '';
    document.getElementById('detail-body').innerHTML = body;

    // YouTube embed
    if (item.video_url) {
      const embedUrl = getYouTubeEmbed(item.video_url);
      if (embedUrl) {
        document.getElementById('youtube-embed').src = embedUrl;
        document.getElementById('video-section').classList.remove('hidden');
      }
    }

    // Share links
    const url = encodeURIComponent(window.location.href);
    const title = encodeURIComponent(item.title);
    document.getElementById('share-wa').href = `https://wa.me/?text=${title}%20${url}`;
    document.getElementById('share-li').href = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;

    document.getElementById('loading-state').classList.add('hidden');
    document.getElementById('main-content').classList.remove('hidden');
  } catch {
    showError();
  }
}

function showError() {
  document.getElementById('loading-state').classList.add('hidden');
  document.getElementById('error-state').classList.remove('hidden');
}

load();
</script>

<script src="footer-loader.js"></script>
<script src="footer-contact.js"></script>
</body>
</html>
